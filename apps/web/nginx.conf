# HWMS Web (PWA) production nginx config.
# Serves the static SPA and reverse-proxies the API + object storage, so the
# browser talks to a single origin (no CORS, refresh cookie stays SameSite).

upstream hwms_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client upload ceiling — matches API limits (selfie 2MB, attachment 5MB)
    # with headroom for multipart overhead.
    client_max_body_size 8m;

    # Security headers (defense in depth alongside helmet on the API).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- API reverse proxy ---
    location /api/ {
        proxy_pass http://hwms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Service worker must never be cached (PWA update correctness) ---
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # --- Long-cache hashed assets ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
