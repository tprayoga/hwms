packages:
  - 'apps/*'
  - 'packages/*'

# Security overrides (Phase 7 hardening). Forces patched transitive versions
# for advisories that have no fix in the direct dependency's own range.
overrides:
  vite@<6.4.3: '>=6.4.3'
  esbuild@<0.25.0: '>=0.25.0'
  glob@>=10.2.0 <10.5.0: '>=10.5.0'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  tmp@<0.2.6: '>=0.2.6'
  multer@<2.1.0: '>=2.1.0'
  # SheetJS's patched releases (>=0.20) are published only on cdn.sheetjs.com,
  # not npmjs. Pin the fixed tarball to clear the prototype-pollution + ReDoS
  # advisories (GHSA on xlsx <0.19.3 / <0.20.2).
  xlsx: 'https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz'

allowBuilds:
  '@nestjs/core': set this to true or false
  '@prisma/client': set this to true or false
  '@prisma/engines': set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: set this to true or false
  prisma: set this to true or false

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "prisma"
