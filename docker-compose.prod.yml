# ============================================================================
# HWMS — production stack (on-prem / SaftOS default target).
# Secrets come from a .env file next to this compose (see DEPLOY.md). Never
# commit that file. Bring the stack up with:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: hwms-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hwms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hwms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hwms} -d ${POSTGRES_DB:-hwms}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # No published port in production — only the app network reaches the DB.

  redis:
    image: redis:7-alpine
    container_name: hwms-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: hwms-minio-prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: create buckets and enforce the 90-day selfie lifecycle at the
  # storage layer (defense in depth alongside the selfie-cleanup worker job).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set m http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do echo 'wait minio'; sleep 2; done;
      mc mb -p m/selfies;
      mc mb -p m/evidences;
      mc mb -p m/attachments;
      mc ilm rule add m/selfies --expire-days 90 || mc ilm add --expiry-days 90 m/selfies || true;
      echo 'buckets ready';
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}

  # One-shot: apply Prisma migrations before the API/worker start.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: hwms-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: hwms-api:latest
    container_name: hwms-api-prod
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: us-east-1
      S3_BUCKET_SELFIES: selfies
      S3_BUCKET_EVIDENCES: evidences
      S3_BUCKET_ATTACHMENTS: attachments
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@indotek.com}
    command: ["node", "dist/src/main.js"]
    volumes:
      - uploads_data:/repo/apps/uploads

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: hwms-api:latest
    container_name: hwms-worker-prod
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_SELFIES: selfies
      S3_BUCKET_EVIDENCES: evidences
      S3_BUCKET_ATTACHMENTS: attachments
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@indotek.com}
    command: ["node", "dist/src/worker.js"]
    # Shares the uploads volume so async report exports are downloadable via API.
    volumes:
      - uploads_data:/repo/apps/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    image: hwms-web:latest
    container_name: hwms-web-prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

  # Optional demo seed (Saft VE POC + 456 tasks + 24 users). Run explicitly:
  #   docker compose -f docker-compose.prod.yml --profile demo run --rm seed
  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: hwms-api:latest
    profiles: ["demo"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # ts-node keeps the workbook's relative paths intact (see Dockerfile notes).
    command: ["pnpm", "exec", "ts-node", "prisma/seed/index.ts"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
